<!DOCTYPE html>
<html>
<head>
  <title>My First 3D Scene</title>
  <style>
    body { margin: 0; }
  </style>
</head>
<body>
  <script src="https://cdn.jsdelivr.net/npm/three@0.158/build/three.min.js"></script>
  <script>
    // 1. Create scene
    const scene = new THREE.Scene();

    // 2. Create camera
    const camera = new THREE.PerspectiveCamera(
      75, // field of view
      window.innerWidth / window.innerHeight, // aspect ratio
      0.1, // near clipping
      1000 // far clipping
    );

    // 3. Create renderer
    const renderer = new THREE.WebGLRenderer();
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // 4. Create a cube
    const geometry = new THREE.BoxGeometry();
    const material = new THREE.MeshPhysicalMaterial({
    color: 0x008080, // Color of the material
    metalness: 0.5, // How metallic the surface is, from 0.0 to 1.0
    roughness: 0.2, // How rough the surface is, from 0.0 to 1.0
    clearcoat: 1.0, // Intensity of the clear coat layer, from 0.0 to 1.0
    clearcoatRoughness: 0.1 // Roughness of the clear coat layer, from 0.0 to 1.0
    });
    const cube = new THREE.Mesh(geometry, material);
    scene.add(cube);

    // Lighting
    const light = new THREE.PointLight(0xffffff, 5);
    light.position.set(10, 10, 10);
    scene.add(light);
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
    scene.add(ambientLight);
    // 5. Position camera
    camera.position.z = 10;

    // 6. Animation loop
    function animate() {
      requestAnimationFrame(animate);

      // Camera movement
      camera.position.z -= 0.05;

      //Ground

      const groundGeometry = new THREE.PlaneGeometry(50, 50);
      const groundMaterial = new THREE.MeshStandardMaterial({ color: 0x333333 });
      const ground = new THREE.Mesh(groundGeometry, groundMaterial);

      ground.rotation.x = -Math.PI / 2; // make it flat
      ground.position.y = -1;

      scene.add(ground);

      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
