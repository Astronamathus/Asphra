<!DOCTYPE html>
<html>
<head>
  <title>Asphra</title>
  <style>
    body { margin: 0; }
  </style>
</head>
<body>
  <script src="https://cdn.jsdelivr.net/npm/three@0.158/build/three.min.js"></script>
  <script>
    // 1. Create scene
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87CEEB);

    // 2. Create camera
    const camera = new THREE.PerspectiveCamera(
      75, // field of view
      window.innerWidth / window.innerHeight, // aspect ratio
      0.1, // near clipping
      1000 // far clipping
    );

    // 3. Create renderer
    const renderer = new THREE.WebGLRenderer();
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // 4. Create a cube
    const geometry = new THREE.BoxGeometry();
    const material = new THREE.MeshPhysicalMaterial({
    color: 0x008080, // Color of the material
    metalness: 0.5, // How metallic the surface is, from 0.0 to 1.0
    roughness: 0.2, // How rough the surface is, from 0.0 to 1.0
    clearcoat: 1.0, // Intensity of the clear coat layer, from 0.0 to 1.0
    clearcoatRoughness: 0.1 // Roughness of the clear coat layer, from 0.0 to 1.0
    });
    const cube = new THREE.Mesh(geometry, material);
    cube.position.y = 0.5;
    scene.add(cube);

    //Road
    const roadGeometry = new THREE.PlaneGeometry(10, 200); // narrow & long
    const roadMaterial = new THREE.MeshStandardMaterial({ color: 0x555555 }); // grey

    const road = new THREE.Mesh(roadGeometry, roadMaterial);

    road.rotation.x = -Math.PI / 2;
    road.position.y = -1;
    
    scene.add(road);

    //Lane Splitter
    const lineGeometry = new THREE.PlaneGeometry(0.2, 200);
    const lineMaterial = new THREE.MeshBasicMaterial({ color: 0xffffff });

    const line = new THREE.Mesh(lineGeometry, lineMaterial);

    line.rotation.x = -Math.PI / 2;
    line.position.y = -0.99; // slightly above road
    scene.add(line);

    // Lighting
    const light = new THREE.PointLight(0xffffff, 5);
    light.position.set(10, 10, 10);
    scene.add(light);
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
    scene.add(ambientLight);
    
    //Movement
    let turnLeft = false;
    let turnRight = false;
    let moveForward = false;
    let moveBackward = false;
    
    //Controls

    document.addEventListener("keydown", (e) => {
      if (e.key === "ArrowLeft") turnLeft = true;
  if (e.key === "ArrowRight") turnRight = true;
      if (e.key === "ArrowUp") moveForward = true;
      if (e.key === "ArrowDown") moveBackward = true;
    });

    document.addEventListener("keyup", (e) => {    
      if (e.key === "ArrowLeft") turnLeft = false;
      if (e.key === "ArrowRight") turnRight = false;
      if (e.key === "ArrowUp") moveForward = false;
      if (e.key === "ArrowDown") moveBackward = false;
    });


    //Depth
    scene.fog = new THREE.Fog(0x111111, 10, 50);

    // 5. Position camera
    camera.position.z = 10;

    // 6. Animation loop
    function animate() {
      requestAnimationFrame(animate);

      // Cube movement
      let speed = 0.1;
      if (turnLeft) cube.rotation.y += 0.03;
      if (turnRight) cube.rotation.y -= 0.03;
      if (moveForward) cube.position.x += Math.sin(cube.rotation.y) * speed;
      if (moveBackward) cube.position.z -= Math.cos(cube.rotation.y) * speed;


      //Camera follow
      let distance = 8; // how far behind
      let height = 3;   // how high

      // Calculate target position (behind cube)
      let targetX = cube.position.x - Math.sin(cube.rotation.y) * distance;
      let targetZ = cube.position.z + Math.cos(cube.rotation.y) * distance;
      let targetY = cube.position.y + height;

      // Smooth movement (THIS is the key part)
      camera.position.x += (targetX - camera.position.x) * 0.1;
      camera.position.y += (targetY - camera.position.y) * 0.1;
      camera.position.z += (targetZ - camera.position.z) * 0.1;


      camera.lookAt(
        cube.position.x,
        cube.position.y + 1,
        cube.position.z
      );

      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
