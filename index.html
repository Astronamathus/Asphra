<!DOCTYPE html>
<html>
<head>
  <title>Asphra</title>
  <style>
    body { margin: 0; }
  </style>
</head>
<body>
  <script src="https://cdn.jsdelivr.net/npm/three@0.158/build/three.min.js"></script>
  <script>let roadSegments = [];
let segmentLength = 5;
let visibleSegments = 10;
let currentAngle = 0; // direction of road
let visualAngle = 0;
let currentHeight = -1;     // starting height
let targetSlope = 0;        // slope direction
let roadMaterial = new THREE.MeshStandardMaterial({
  color: 0x333333,
  roughness: 0.9,
  metalness: 0.1
});
let turnLeft = false;
let turnRight = false;
let moveForward = false;
let moveBackward = false;
let boost = false;
let handbrake = false;

let roadOffset = 0;
let targetOffset = 0;

// Physics
let turnSpeed = 0;
let targetY = 0;
let maxTurn = 0.03;
let turnAccel = 0.002;

let velocity = 0;
let maxSpeed = 0.6;
let acceleration = 0.01;
let friction = 0.98;
let brakeForce = 0.02;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);
const groundGeo = new THREE.PlaneGeometry(1000, 1000);
const groundMat = new THREE.MeshBasicMaterial({ color: 0x228B22 });
const ground = new THREE.Mesh(groundGeo, groundMat);

ground.rotation.x = -Math.PI / 2;
ground.position.y = -2;

scene.add(ground);
// Camera (basic, real logic in camera.js)
const camera = new THREE.PerspectiveCamera(
  100,
  window.innerWidth / window.innerHeight,
  0.1,
  1000
);

// Renderer
const renderer = new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// Lighting
const light = new THREE.PointLight(0xffffff, 5);
light.position.set(10, 10, 10);
scene.add(light);

const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
scene.add(ambientLight);

function createRoad(scene) {
  for (let i = 0; i < visibleSegments; i++) {
    addSegment(scene);
  }
}

function addSegment(scene, zPos) {
  const geometry = new THREE.PlaneGeometry(10, segmentLength);
  const segment = new THREE.Mesh(geometry, roadMaterial);

  segment.rotation.x = -Math.PI / 2;

  // RANDOM TURN (small)
  
  // Position relative to last segment
  if (roadSegments.length === 0) {
    segment.position.set(0, -1, 0);
  } else {
    const last = roadSegments[roadSegments.length - 1];

    let shift = (Math.random() - 0.5) * 2; // how sharp turns feel

    segment.position.x = last.position.x + shift;
    segment.position.z = last.position.z - segmentLength;

    // Occasionally change direction
    if (Math.random() < 0.3) {
      targetOffset += (Math.random() - 0.5) * 5;
    }

    // Clamp so road doesn't drift infinitely
    targetOffset = Math.max(-10, Math.min(10, targetOffset));

    // Smooth transition
    roadOffset += (targetOffset - roadOffset) * 0.1;

    segment.position.x = last.position.x + roadOffset;
    segment.position.z = last.position.z - segmentLength;
    
    // RANDOM SLOPE CHANGE (gentle)
    let slopeChange = (Math.random() - 0.5) * 0.02;
    targetSlope += slopeChange;

    // Limit slope (prevents insane hills)
    targetSlope = Math.max(-0.1, Math.min(0.1, targetSlope));

    // Apply slope
    currentHeight += targetSlope * segmentLength;
  }
  segment.position.y = currentHeight;
  let tilt = Math.atan(targetSlope);
  segment.rotation.set(-Math.PI / 2 + tilt, 0, 0);
  
  scene.add(segment);
  roadSegments.push(segment);

  createLaneDashes(segment);

  createBarriers(segment);
}
  function createLaneDashes(parentSegment) {
  // Properly clear old dashes
  while (parentSegment.children.length > 0) {
    parentSegment.remove(parentSegment.children[0]);
  }

  const dashLength = 3;
  const gap = 1;

  const dashGeometry = new THREE.PlaneGeometry(dashLength, 0.3);
  const dashMaterial = new THREE.MeshBasicMaterial({ color: 0xffff00 });

  for (let i = -segmentLength / 2; i < segmentLength / 2; i += dashLength + gap) {
    const dash = new THREE.Mesh(dashGeometry, dashMaterial);

    // Lay flat
    dash.rotation.z = -Math.PI / 2;
    dash.rotation.y = 0; // let parent handle rotation

    
    // Slightly above road surface
    dash.position.set(0, 0.02, i);

    parentSegment.add(dash);
  }
}
function updateRoad(scene, car) {
  if (roadSegments.length === 0) return;

  let first = roadSegments[0];
  let last = roadSegments[roadSegments.length - 1];

  // Distance between car and last segment
  let dist = car.position.distanceTo(last.position);

  if (dist < segmentLength * 5) {
    // Add new segment ahead
    addSegment(scene);

    // Remove old segment behind
    scene.remove(first);
    roadSegments.shift();
  }
}

//Barriers
function createBarriers(segment) {
  const barrierHeight = 1;
  const barrierWidth = 0.3;
  const roadWidth = 10;

  const geometry = new THREE.BoxGeometry(barrierWidth, barrierHeight, segmentLength);
  const material = new THREE.MeshStandardMaterial({ color: 0xffffff });

  // LEFT barrier
  const leftBarrier = new THREE.Mesh(geometry, material);
  leftBarrier.position.set(-roadWidth / 2, barrierHeight / 2, 0);

  // RIGHT barrier
  const rightBarrier = new THREE.Mesh(geometry, material);
  rightBarrier.position.set(roadWidth / 2, barrierHeight / 2, 0);

  // Match road tilt (IMPORTANT)
  leftBarrier.rotation.x = segment.rotation.x;
  rightBarrier.rotation.x = segment.rotation.x;

  segment.add(leftBarrier);
  segment.add(rightBarrier);
}

// Controls
document.addEventListener("keydown", (e) => {
  if (e.key === "ArrowLeft") turnLeft = true;
  if (e.key === "ArrowRight") turnRight = true;
  if (e.key === "ArrowUp") moveForward = true;
  if (e.key === "ArrowDown") moveBackward = true;
  if (e.key === "Shift") boost = true;
  if (e.key === " ") handbrake = true;
});

document.addEventListener("keyup", (e) => {
  if (e.key === "ArrowLeft") turnLeft = false;
  if (e.key === "ArrowRight") turnRight = false;
  if (e.key === "ArrowUp") moveForward = false;
  if (e.key === "ArrowDown") moveBackward = false;
  if (e.key === "Shift") boost = false;
  if (e.key === " ") handbrake = false;
});

// Create car
function createCar(scene) {
  const geometry = new THREE.BoxGeometry();
  const material = new THREE.MeshPhysicalMaterial({
    color: 0xFFFF00,
    metalness: 0.5,
    roughness: 0.2,
    clearcoat: 1.0,
    clearcoatRoughness: 0.1
  });

  const cube = new THREE.Mesh(geometry, material);
  cube.position.y = 0.5;
  scene.add(cube);

  return cube;
}

// Update car
function updateCar(cube) {
  // Turning
  if (turnLeft) turnSpeed -= turnAccel;
  if (turnRight) turnSpeed += turnAccel;

  turnSpeed = Math.max(-maxTurn, Math.min(maxTurn, turnSpeed));
  turnSpeed *= 0.85;

  cube.rotation.y += turnSpeed;
  cube.rotation.z = -turnSpeed * 5;

  // Acceleration
  if (moveForward) velocity += acceleration;
  if (boost) velocity += acceleration * 0.5;
  velocity = Math.max(-0.3, Math.min(maxSpeed * 1.5, velocity));
  if (moveBackward) velocity -= brakeForce;
  if (handbrake) {
    if (velocity >= 0){
      velocity -= brakeForce*0.5;
    }
  }

  velocity = Math.max(-0.3, Math.min(maxSpeed, velocity));
  velocity *= friction;

  if (Math.abs(velocity) < 0.001) velocity = 0;


  let closest = null;
  let minDist = Infinity;

  for (let seg of roadSegments) {
    let dx = cube.position.x - seg.position.x;
    let dz = cube.position.z - seg.position.z;
    let dist = dx * dx + dz * dz;

    if (dist < minDist) {
      minDist = dist;
      closest = seg;
    }
  }

  if (closest) {
    targetY = closest.position.y + 0.5;

    // Match road tilt
    cube.rotation.x += (closest.rotation.x + Math.PI / 2 - cube.rotation.x) * 0.1;
  }

  // Movement
  cube.position.x += Math.sin(cube.rotation.y) * velocity;
  cube.position.z -= Math.cos(cube.rotation.y) * velocity;
}

function updateCamera(camera, cube) {
  let distance = 8;
  let height = 3;
  let speedFactor = Math.abs(velocity) * 2;

  let dynamicDistance = distance + speedFactor;
  let dynamicHeight = height + speedFactor * 0.3;
    // Smooth follow
    cube.position.y += (targetY - cube.position.y) * 0.2;

  let targetX = cube.position.x - Math.sin(cube.rotation.y) * dynamicDistance;
  let targetZ = cube.position.z + Math.cos(cube.rotation.y) * dynamicDistance;
  targetY = cube.position.y + dynamicHeight;


  // Smooth follow
  camera.position.x += (targetX - camera.position.x) * 0.1;
  camera.position.y += (targetY - camera.position.y) * 0.1;
  camera.position.z += (targetZ - camera.position.z) * 0.1;

  // Look forward (not center)
  let lookX = cube.position.x + Math.sin(cube.rotation.y);
  let lookZ = cube.position.z - Math.cos(cube.rotation.y);

  camera.lookAt(lookX, cube.position.y, lookZ);

}


// Fog
scene.fog = new THREE.Fog(0x111111, 10, 50);


// Create systems
createRoad(scene);
const car = createCar(scene);

// Initial camera position
camera.position.z = 10;

// Animation loop
function animate() {
  requestAnimationFrame(animate);

  updateCar(car);
  updateRoad(scene, car);
  updateCamera(camera, car);

  renderer.render(scene, camera);
  renderer.shadowMap.enabled = true;
  light.castShadow = true;
  car.castShadow = true;
}

animate();</script>
</body>
</html>
